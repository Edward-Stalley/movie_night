services:
  db:
    image: postgres:16
    container_name: "movie_night_db"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: movie_night
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  app:
    build: ./movie_night_app
    container_name: movie_night_next_app
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./movie_night_app:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data: